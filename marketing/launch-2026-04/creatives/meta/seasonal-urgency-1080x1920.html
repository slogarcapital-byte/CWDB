<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CWDB Launch 2026-04 · Seasonal Urgency · 1080x1920 (9:16)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Staatliches&display=swap">
  <style>
    :root {
      --cwdb-orange:    #e54c00;
      --cwdb-slate:     #323434;
      --cwdb-grey:      #646760;
      --cwdb-off-white: #f8f8f6;
      --cwdb-white:     #ffffff;
      --cwdb-font-display: 'Staatliches', sans-serif;
      --cwdb-font-body:    'Public Sans', sans-serif;
    }
    html, body { margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: var(--cwdb-font-body);
      background: var(--cwdb-slate);
      position: relative;
    }
    .photo {
      position: absolute;
      inset: 0;
      background-image: url("http://127.0.0.1:8733/branding/logos/web/hero-merrill.webp");
      background-size: cover;
      background-position: center 50%;
    }
    .scrim-top {
      position: absolute;
      inset: 0 0 auto 0;
      height: 480px;
      background: linear-gradient(180deg, rgba(20,22,22,0.88) 0%, rgba(20,22,22,0.78) 40%, rgba(20,22,22,0.40) 70%, rgba(50,52,52,0.0) 100%);
    }
    .scrim-bottom {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.0) 0%,
        rgba(0,0,0,0.0) 38%,
        rgba(50,52,52,0.55) 58%,
        rgba(50,52,52,0.96) 100%);
    }
    .logo-wrap {
      position: absolute;
      top: 200px;
      left: 72px;
      z-index: 2;
    }
    .logo-wrap img {
      height: 72px;
      width: auto;
      display: block;
    }
    .eyebrow {
      font-family: var(--cwdb-font-body);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 2.6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.80);
      margin: 0 0 22px 0;
    }
    .eyebrow::before {
      content: "";
      display: inline-block;
      width: 36px;
      height: 2px;
      background: rgba(255,255,255,0.80);
      vertical-align: middle;
      margin-right: 14px;
      margin-bottom: 4px;
    }
    .content {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 280px;
      z-index: 2;
      color: var(--cwdb-white);
    }
    .cwdb-hed {
      font-family: var(--cwdb-font-display);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 0.94;
      font-size: 138px;
      color: var(--cwdb-white);
      margin: 0 0 32px 0;
      max-width: 11ch;
    }
    .cwdb-sub {
      font-family: var(--cwdb-font-body);
      font-weight: 500;
      font-size: 36px;
      line-height: 1.34;
      color: rgba(255,255,255,0.95);
      margin: 0 0 56px 0;
      max-width: 24ch;
    }
    .cwdb-cta {
      display: inline-flex;
      align-items: center;
      padding: 28px 44px;
      background: var(--cwdb-orange);
      color: var(--cwdb-white);
      font-family: var(--cwdb-font-body);
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 4px;
      text-decoration: none;
      margin-bottom: 40px;
    }
    .cwdb-trust-row {
      font-family: var(--cwdb-font-body);
      font-weight: 600;
      font-size: 17px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
      white-space: nowrap;
    }
    .cwdb-trust-row > span:not(:last-child)::after {
      content: "·";
      margin: 0 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="photo" role="img" aria-label="Central Wisconsin deck with patio furniture and pines"></div>
  <div class="scrim-top"></div>
  <div class="scrim-bottom"></div>

  <div class="logo-wrap">
    <img src="http://127.0.0.1:8733/branding/logos/web/logo-horizontal@2x-white.png" alt="Central Wisconsin Deck Builders">
  </div>

  <div class="content">
    <p class="eyebrow">Wisconsin Summer 2026</p>
    <h1 class="cwdb-hed">Book before May fills up.</h1>
    <p class="cwdb-sub">Good Central WI deck builders book out fast. Free quote from a vetted local builder in 48 hours.</p>
    <a class="cwdb-cta" href="#">Get Quote</a>
    <div class="cwdb-trust-row">
      <span>Licensed</span><span>Local</span><span>Summer&nbsp;Slots&nbsp;Open</span>
    </div>
  </div>
</body>
</html>

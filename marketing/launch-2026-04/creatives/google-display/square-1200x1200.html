<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CWDB Launch 2026-04 · Google Display · 1200x1200</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Staatliches&display=swap">
  <style>
    :root {
      --cwdb-orange:    #e54c00;
      --cwdb-slate:     #323434;
      --cwdb-grey:      #646760;
      --cwdb-off-white: #f8f8f6;
      --cwdb-white:     #ffffff;
      --cwdb-font-display: 'Staatliches', sans-serif;
      --cwdb-font-body:    'Public Sans', sans-serif;
    }
    html, body { margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 1200px;
      overflow: hidden;
      font-family: var(--cwdb-font-body);
      background: var(--cwdb-off-white);
      display: flex;
      flex-direction: column;
    }
    .photo {
      flex: 0 0 720px;
      background-image: url("/website/pages/gallery/project-photos/wausau-deck.webp");
      background-size: cover;
      background-position: center center;
      position: relative;
    }
    .photo::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 170px;
      background: linear-gradient(180deg, rgba(0,0,0,0.38), rgba(0,0,0,0));
    }
    .photo-logo {
      position: absolute;
      top: 46px;
      left: 56px;
      height: 56px;
      width: auto;
    }
    .type-block {
      flex: 1;
      padding: 40px 56px 52px 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 0;
    }
    .cwdb-hed {
      font-family: var(--cwdb-font-display);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 0.94;
      font-size: 96px;
      color: var(--cwdb-slate);
      margin: 0 0 16px 0;
    }
    .cwdb-sub {
      font-family: var(--cwdb-font-body);
      font-weight: 500;
      font-size: 22px;
      line-height: 1.4;
      color: var(--cwdb-grey);
      margin: 0;
      max-width: 42ch;
    }
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-top: 20px;
    }
    .cwdb-cta {
      display: inline-flex;
      align-items: center;
      padding: 20px 34px;
      background: var(--cwdb-orange);
      color: var(--cwdb-white);
      font-family: var(--cwdb-font-body);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      border-radius: 4px;
      text-decoration: none;
    }
    .cwdb-trust-row {
      font-family: var(--cwdb-font-body);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--cwdb-grey);
    }
    .cwdb-trust-row > span:not(:last-child)::after {
      content: "·";
      margin: 0 10px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="photo" role="img" aria-label="Central Wisconsin wood deck">
    <img class="photo-logo" src="/branding/logos/web/logo-horizontal@2x-white.png" alt="Central Wisconsin Deck Builders">
  </div>
  <div class="type-block">
    <div>
      <h1 class="cwdb-hed">48 hours.<br>Not 48 days.</h1>
      <p class="cwdb-sub">Licensed local deck builders in Central Wisconsin. One short form. Real quote. No phone tag.</p>
    </div>
    <div class="footer-row">
      <a class="cwdb-cta" href="#">Get a Free Quote</a>
      <div class="cwdb-trust-row">
        <span>Licensed</span><span>Insured</span><span>Local</span>
      </div>
    </div>
  </div>
</body>
</html>

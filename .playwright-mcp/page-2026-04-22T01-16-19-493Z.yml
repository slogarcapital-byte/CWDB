  - generic [ref=e17]:
    - generic [ref=e18]: About CWDB
    - heading "Building decks should be exciting not stressful" [level=1] [ref=e19]
    - paragraph [ref=e20]: Central Wisconsin Deck Builders exists to take the guesswork out of finding a great contractor. We vet the builders so you don't have to.
  - generic [ref=e21]:
    - generic [ref=e23]:
      - heading "Our Mission" [level=2] [ref=e24]
      - paragraph [ref=e25]: "We connect Central Wisconsin homeowners with trusted, licensed deck builders — quickly and without hassle. Every contractor in our network is vetted for licensing, insurance, and quality of work. Our goal is simple: make it easy for you to find the right builder and start your project with confidence."
    - generic [ref=e27]:
      - heading "Why We Started CWDB" [level=2] [ref=e28]
      - paragraph [ref=e29]: Here's how it usually goes. You decide you want a new deck. You search online, ask neighbors, maybe post on Nextdoor. You call a few contractors. One doesn't answer. One says they're booked through October. Another gives you a quote but never follows up.
      - paragraph [ref=e30]: Weeks go by. You're no closer to breaking ground.
      - paragraph [ref=e31]: We started Central Wisconsin Deck Builders because that experience is too common — and it doesn't have to be that way.
      - paragraph [ref=e32]: We do the work upfront. We find experienced, licensed deck builders in the Wausau area. We verify their credentials, their insurance, and their reputation. Then when you're ready to build, we connect you with a contractor who's actually available, qualified, and ready to earn your business.
      - paragraph [ref=e33]: No cold-calling five companies. No chasing callbacks. No wondering if the guy your cousin's neighbor recommended is actually insured.
      - paragraph [ref=e34]: You tell us what you need. We match you with someone who can build it.
    - generic [ref=e36]:
      - heading "How We're Different" [level=2] [ref=e37]
      - generic [ref=e38]:
        - generic [ref=e39]:
          - generic [ref=e40]: "01"
          - heading "We Vet Every Builder" [level=3] [ref=e41]
          - paragraph [ref=e42]: Contractors in our network go through a credential review before they're approved — licensing, insurance, workers' comp, and references. Not everyone gets in.
        - generic [ref=e43]:
          - generic [ref=e44]: "02"
          - heading "You Get Fast Responses" [level=3] [ref=e45]
          - paragraph [ref=e46]: Most homeowners hear back from a contractor within 48 hours of submitting a request. No more waiting days or weeks for a callback.
        - generic [ref=e47]:
          - generic [ref=e48]: "03"
          - heading "It's Free for Homeowners" [level=3] [ref=e49]
          - paragraph [ref=e50]: There's no fee, no hidden cost, and no obligation. You get a quote, review it, and decide on your own terms.
        - generic [ref=e51]:
          - generic [ref=e52]: "04"
          - heading "We're Local" [level=3] [ref=e53]
          - paragraph [ref=e54]: This isn't a national referral network run out of a call center. We focus exclusively on Central Wisconsin — Wausau, Weston, Schofield, Mosinee, and Merrill. We know the market because we're part of it.

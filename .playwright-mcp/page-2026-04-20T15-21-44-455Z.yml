    - paragraph [ref=e24]: Legal
    - heading "Terms of Service" [level=2] [ref=e25]
    - generic [ref=e27]:
      - heading "1. Acceptance of Terms" [level=2] [ref=e28]
      - paragraph [ref=e29]: By accessing or using the Central Wisconsin Deck Builders website (cwdeckbuilders.com), you agree to be bound by these Terms of Service ("Terms"). If you do not agree to these Terms, do not use our website or services.
      - paragraph [ref=e30]: ‍
      - heading "2. Service Description" [level=2] [ref=e31]
      - paragraph [ref=e32]: Central Wisconsin Deck Builders ("CWDB," "we," "us," or "our") operates an online platform that connects homeowners with vetted, licensed deck building contractors in Central Wisconsin. Our service includes accepting project details via online quote request forms, reviewing and qualifying project requests, matching homeowners with contractors in our network based on location, availability, and project type, and facilitating the initial connection between homeowner and contractor. CWDB is a referral and matching service. We are not a general contractor, construction company, or builder. We do not perform any construction work, and we are not a party to any agreement between you and a contractor.
      - paragraph [ref=e33]: ‍
      - heading "3. No Guarantees on Contractor Work" [level=2] [ref=e34]
      - paragraph [ref=e35]: While we vet every contractor in our network for licensing, insurance, and track record, we do not guarantee the quality, timeliness, cost, or outcome of any work performed by a contractor. CWDB does not guarantee that a contractor's quote will match the final project cost, that work will be completed by a specific date, that the finished project will meet your expectations, that no disputes will arise between you and the contractor, or that a contractor will remain available after being matched to your project. Any agreement you enter into with a contractor — including scope, pricing, timeline, warranties, and payment terms — is solely between you and the contractor.
      - paragraph [ref=e36]: ‍
      - heading "4. User Responsibilities" [level=2] [ref=e37]
      - paragraph [ref=e38]: By using our website and submitting a quote request, you represent and agree that you are at least 18 years of age, are the homeowner or authorized representative for the property where the deck project will take place, the information you provide is accurate and truthful, you understand that submitting a form does not create a contract for construction services, you will communicate directly with the matched contractor regarding project details, and you are responsible for conducting your own due diligence before hiring any contractor.
      - paragraph [ref=e39]: ‍
      - heading "5. No Fee to Homeowners" [level=2] [ref=e40]
      - paragraph [ref=e41]: Our service is free for homeowners. There is no charge to submit a quote request, receive a contractor match, or obtain a quote. You are never obligated to hire a contractor through our service.
      - paragraph [ref=e42]: ‍
      - heading "6. Intellectual Property" [level=2] [ref=e43]
      - paragraph [ref=e44]: All content on the CWDB website — including text, images, logos, graphics, and design — is the property of Central Wisconsin Deck Builders or its licensors and is protected by applicable intellectual property laws. You may not copy, reproduce, or distribute any content from our website without written permission, use our name, logo, or branding in any way that implies endorsement or affiliation without authorization, or scrape, data mine, or systematically download content from our website.
      - paragraph [ref=e45]: ‍
      - heading "7. Website Availability" [level=2] [ref=e46]
      - paragraph [ref=e47]: We strive to keep our website available and functional at all times, but we do not guarantee uninterrupted access. The website may be temporarily unavailable due to maintenance, updates, server issues, or circumstances beyond our control.
      - paragraph [ref=e48]: ‍
      - heading "8. Limitation of Liability" [level=2] [ref=e49]
      - paragraph [ref=e50]: To the fullest extent permitted by law, Central Wisconsin Deck Builders, its owners, operators, employees, and affiliates shall not be liable for any direct, indirect, incidental, consequential, or punitive damages arising from your use of our website or service; damages resulting from any contractor's work, conduct, or failure to perform; loss of data, revenue, or business opportunity related to the use of our service; or errors, inaccuracies, or omissions in website content. Our total liability to you for any claim arising from or related to our service shall not exceed $100. You acknowledge that CWDB is a free referral service for homeowners and that this limitation of liability is reasonable given the nature of the service provided.
      - paragraph [ref=e51]: ‍
      - heading "9. Indemnification" [level=2] [ref=e52]
      - paragraph [ref=e53]: You agree to indemnify, defend, and hold harmless Central Wisconsin Deck Builders, its owners, operators, employees, and affiliates from any claims, damages, losses, liabilities, costs, or expenses (including reasonable attorney fees) arising from your use of our website or service, your violation of these Terms, any dispute between you and a contractor, or any inaccuracy in the information you provided.
      - paragraph [ref=e54]: ‍
      - heading "10. Third-Party Links and Services" [level=2] [ref=e55]
      - paragraph [ref=e56]: Our website may contain links to third-party websites or integrate third-party services (such as form providers, analytics tools, and advertising platforms). We are not responsible for the content, privacy practices, or terms of any third-party site or service.
      - paragraph [ref=e57]: ‍
      - heading "11. Dispute Resolution" [level=2] [ref=e58]
      - paragraph [ref=e59]: "Any dispute arising from or related to these Terms or your use of our service shall be resolved as follows. First, informal resolution: you agree to first attempt to resolve any dispute informally by contacting us at info@cwdeckbuilders.com. We will make a good-faith effort to resolve the issue within 30 days. Second, mediation: if informal resolution is unsuccessful, either party may request mediation through a mutually agreed-upon mediator in Marathon County, Wisconsin. Third, litigation: if mediation is unsuccessful, any remaining dispute shall be resolved in the state or federal courts located in Marathon County, Wisconsin."
      - paragraph [ref=e60]: ‍
      - heading "12. Governing Law" [level=2] [ref=e61]
      - paragraph [ref=e62]: These Terms shall be governed by and construed in accordance with the laws of the State of Wisconsin, without regard to its conflict of law provisions. You consent to the exclusive jurisdiction of the courts in Marathon County, Wisconsin.
      - paragraph [ref=e63]: ‍
      - heading "13. Modifications to Terms" [level=2] [ref=e64]
      - paragraph [ref=e65]: We reserve the right to update or modify these Terms at any time. When we do, we will update the "Last Updated" date at the top of this page. Your continued use of our website after any changes constitutes your acceptance of the revised Terms.
      - paragraph [ref=e66]: ‍
      - heading "14. Severability" [level=2] [ref=e67]
      - paragraph [ref=e68]: If any provision of these Terms is found to be unenforceable or invalid by a court of competent jurisdiction, that provision shall be limited or eliminated to the minimum extent necessary, and the remaining provisions shall remain in full force and effect.
      - paragraph [ref=e69]: ‍
      - heading "15. Entire Agreement" [level=2] [ref=e70]
      - paragraph [ref=e71]: These Terms, together with our Privacy Policy, constitute the entire agreement between you and Central Wisconsin Deck Builders regarding your use of our website and service.
      - paragraph [ref=e72]: ‍
      - heading "Contact Us" [level=2] [ref=e73]

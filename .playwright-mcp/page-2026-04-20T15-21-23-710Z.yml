  - generic [ref=e23]:
    - paragraph [ref=e24]: Legal
    - heading "Privacy Policy" [level=2] [ref=e25]
    - generic [ref=e26]:
      - heading "Introduction" [level=2] [ref=e27]
      - paragraph [ref=e28]: Central Wisconsin Deck Builders ("CWDB") operates cwdeckbuilders.com. This Privacy Policy explains how we collect, use, disclose, and protect your personal information when you visit our website or submit information through our forms. By using our website, you agree to the collection and use of information as described in this policy.
      - heading "Information We Collect" [level=2] [ref=e29]
      - heading "Information You Provide" [level=3] [ref=e30]
      - paragraph [ref=e31]: "When you submit a quote request form, we collect: full name, email address, phone number, property address or city/zip code, deck project details (type, size, materials, timeline, budget), and any additional comments or project notes you provide."
      - heading "Information Collected Automatically" [level=3] [ref=e32]
      - paragraph [ref=e33]: "When you visit our website, we may automatically collect: IP address, browser type and version, operating system, pages visited and time spent on each page, referring website or source, device type (desktop, mobile, tablet), and approximate geographic location (city/region level, derived from IP). This information is collected through cookies, pixels, and analytics tools as described below."
      - heading "Cookies and Tracking Technologies" [level=2] [ref=e34]
      - paragraph [ref=e35]: "We use the following analytics and advertising tools on our website:"
      - heading "Google Analytics 4 (GA4)" [level=3] [ref=e36]
      - paragraph [ref=e37]: We use GA4 to understand how visitors interact with our website — which pages are visited, how long users stay, and where traffic comes from. GA4 may use cookies to collect anonymized usage data. See Google's privacy policy at policies.google.com/privacy.
      - heading "Meta Pixel (Facebook/Instagram)" [level=3] [ref=e38]
      - paragraph [ref=e39]: We use the Meta Pixel to measure the effectiveness of our Facebook and Instagram advertising campaigns. The pixel tracks actions like page views and form submissions. See Meta's privacy policy at facebook.com/privacy/policy/
      - heading "Nextdoor Pixel" [level=3] [ref=e40]
      - paragraph [ref=e41]: We use the Nextdoor conversion pixel to measure advertising performance on the Nextdoor platform. See Nextdoor's privacy policy at nextdoor.com/privacy_policy/
      - heading "Microsoft Clarity" [level=3] [ref=e42]
      - paragraph [ref=e43]: We use Microsoft Clarity to understand how users interact with our website through session recordings and heatmaps. Clarity does not collect personal information from form fields. See Microsoft's privacy policy at privacy.microsoft.com/privacystatement
      - heading "Cookie Management" [level=3] [ref=e44]
      - paragraph [ref=e45]: Most web browsers allow you to control cookies through their settings. You can set your browser to refuse cookies or to alert you when cookies are being sent. Note that disabling cookies may affect the functionality of certain parts of our website.
      - heading "How We Use Your Information" [level=2] [ref=e46]
      - paragraph [ref=e47]: "We use the information we collect to: provide our service by matching you with a qualified local deck contractor; communicate with you to confirm your request and follow up; improve our website using analytics data; measure advertising performance; and maintain records of quote requests for business purposes."
      - heading "How We Share Your Information" [level=2] [ref=e48]
      - heading "Contractor Partners" [level=3] [ref=e49]
      - paragraph [ref=e50]: "When you submit a quote request, we share your contact information and project details with vetted contractor(s) matched to your project. We share only what is necessary: your name, phone number, email address, property location, and project details."
      - heading "Service Providers" [level=3] [ref=e51]
      - paragraph [ref=e52]: "We may share anonymized or aggregated data with service providers including: website hosting (Webflow), analytics (Google, Microsoft), advertising platforms (Meta, Nextdoor, Google), and CRM (HubSpot)."
      - heading "Legal Requirements" [level=3] [ref=e53]
      - paragraph [ref=e54]: We may disclose your information if required by law or in response to a valid legal request, such as a court order or subpoena.
      - heading "What We Do Not Do" [level=3] [ref=e55]
      - paragraph [ref=e56]: We do not sell your personal information to data brokers or unrelated third parties. We do not share your information with contractors outside our vetted network. We do not use your information for purposes unrelated to our deck builder matching service.
      - heading "Data Retention" [level=2] [ref=e57]
      - paragraph [ref=e58]: "We retain your personal information as long as necessary. Quote request data: up to 24 months. Analytics data: per platform defaults (GA4: 14 months). Advertising data: per each platform's policy. You may request deletion at any time."
      - heading "Your Rights" [level=2] [ref=e59]
      - paragraph [ref=e60]: "You have the right to: Access the personal information we hold about you; Correction of inaccurate information; Deletion of your personal information; and Opt-out of communications at any time. Email info@cwdeckbuilders.com to exercise these rights. We respond within 30 days."
      - heading "Data Security" [level=2] [ref=e61]
      - paragraph [ref=e62]: "We protect your information through: secure HTTPS/TLS form submission, access controls limiting data visibility, and use of reputable third-party providers. No internet transmission method is completely secure, and we cannot guarantee absolute security."
      - heading "Children's Privacy" [level=2] [ref=e63]
      - paragraph [ref=e64]: Our website is not directed to individuals under 18. We do not knowingly collect personal information from children. If we become aware of such collection, we will delete it promptly.
      - heading "Third-Party Links" [level=2] [ref=e65]
      - paragraph [ref=e66]: Our website may contain links to third-party websites. We are not responsible for their privacy practices. We encourage you to review the privacy policies of any external sites you visit.
      - heading "Changes to This Policy" [level=2] [ref=e67]
      - paragraph [ref=e68]: We may update this Privacy Policy from time to time. We will update the "Last Updated" date at the top of this page when we do. We encourage you to review this page periodically.
      - heading "Contact Us" [level=2] [ref=e69]
      - paragraph [ref=e70]: "Questions about this Privacy Policy? Contact us: Central Wisconsin Deck Builders — Email: info@cwdeckbuilders.com — Website: cwdeckbuilders.com"

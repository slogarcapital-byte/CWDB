    - generic [ref=e25]: Service Area
    - heading "Deck Builders in Your City" [level=1] [ref=e26]
    - paragraph [ref=e27]: Expert deck builders serving your city in Central Wisconsin. Free quotes within 24 hours.
  - generic [ref=e29]:
    - heading "Deck Builders Serving Wausau, Wisconsin" [level=2] [ref=e30]
    - generic [ref=e32]:
      - paragraph [ref=e33]: Wausau is the hub of Central Wisconsin — and a great city to build a deck. With long summers, strong demand for outdoor living space, and a growing pool of skilled local contractors, Wausau homeowners have real options when it comes to deck projects.
      - paragraph [ref=e34]: Central Wisconsin Deck Builders connects Wausau homeowners with vetted, licensed deck contractors who know Marathon County building codes, local permit requirements, and Wisconsin's weather patterns. Whether you want a simple pressure-treated platform deck, composite low-maintenance decking, or a full multi-level outdoor living space with a pergola and built-in seating — we'll match you with the right builder.
      - paragraph [ref=e35]: Submit your project details and get your first quote within 24 hours. No spam, no pressure, no cost to you.
  - generic [ref=e37]:
    - heading "Frequently Asked Questions" [level=2] [ref=e38]
    - generic [ref=e39]:
      - generic [ref=e40]:
        - heading "How much does a deck cost in Wausau, WI?" [level=3] [ref=e41]
        - paragraph [ref=e42]: Deck costs in Wausau typically range from $8,000 to $30,000+ depending on size, materials, and complexity. A basic pressure-treated platform deck runs $8,000–$14,000. Composite decking adds 20–40% to material costs. Multi-level decks with pergolas or built-in features can exceed $30,000. Get a free quote to see pricing specific to your project.
      - generic [ref=e43]:
        - heading "Do I need a permit to build a deck in Wausau?" [level=3] [ref=e44]
        - paragraph [ref=e45]: Yes. The City of Wausau requires a building permit for most decks over 200 square feet or more than 30 inches above grade. Permits also apply to decks attached to the home. Our contractors are familiar with Marathon County and Wausau permit requirements and handle the process for you.
      - generic [ref=e46]:
        - heading "How long does it take to build a deck in Wausau?" [level=3] [ref=e47]
        - paragraph [ref=e48]: Most residential decks in Wausau take 3–7 days to build once materials are on-site and permits are approved. Permit approval typically takes 1–2 weeks. Larger or more complex projects may take longer. Timing also depends on contractor availability and the Wisconsin building season — most deck projects run May through October.
      - generic [ref=e49]:
        - heading "What deck materials work best in Wisconsin winters?" [level=3] [ref=e50]
        - paragraph [ref=e51]: Composite decking (such as Trex or TimberTech) is the top choice for Wisconsin's freeze-thaw cycles — it won't warp, rot, or splinter and requires minimal maintenance. Pressure-treated lumber is a durable, cost-effective option when properly sealed and maintained. Cedar is a popular mid-range choice. Our contractors will walk you through the tradeoffs for your budget and usage.
      - generic [ref=e52]:
        - heading "What areas near Wausau do you serve?" [level=3] [ref=e53]
        - paragraph [ref=e54]: We serve Wausau and the surrounding Marathon County area including Schofield, Weston, Rothschild, Rib Mountain, Mosinee, and Merrill. If you're unsure whether your address is in our coverage area, submit a quote request and we'll confirm within 24 hours.

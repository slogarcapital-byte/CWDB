<!--

  Uses Webflow CMS field bindings so ONE snippet covers all 5 city pages dynamically.
  Requires these CMS fields on Service Areas collection (verify they exist, add if missing):
    - name            (PlainText) — city name, e.g. "Wausau"                    ✅ already exists
    - slug            (PlainText) — URL segment, e.g. "wausau"                  ✅ already exists
    - geo-latitude    (Number)    — e.g. 44.9591                                ❌ ADD THIS FIELD
    - geo-longitude   (Number)    — e.g. -89.6301                               ❌ ADD THIS FIELD
    - wikipedia-url   (Link)      — e.g. https://en.wikipedia.org/wiki/Wausau,_Wisconsin  ❌ ADD THIS FIELD

  Then populate the 5 city items with their coords + Wikipedia URLs:
    Wausau     lat 44.9591  lng -89.6301  https://en.wikipedia.org/wiki/Wausau,_Wisconsin
    Schofield  lat 44.9094  lng -89.6065  https://en.wikipedia.org/wiki/Schofield,_Wisconsin
    Weston     lat 44.8914  lng -89.5598  https://en.wikipedia.org/wiki/Weston,_Marathon_County,_Wisconsin
    Mosinee    lat 44.7925  lng -89.7032  https://en.wikipedia.org/wiki/Mosinee,_Wisconsin
    Merrill    lat 45.1805  lng -89.6837  https://en.wikipedia.org/wiki/Merrill,_Wisconsin
-->
